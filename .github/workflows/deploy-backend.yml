# CULTR Ventures — Deploy Backend to Hetzner
# Triggered manually or on push to main (after CI passes)

name: Deploy Backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner AX52
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_AX52_IP }}
          username: cultr
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/cultr-platform
            git pull origin main
            docker compose -f docker/docker-compose.yml build --no-cache fastapi celery-worker
            docker compose -f docker/docker-compose.yml up -d --remove-orphans
            docker compose -f docker/docker-compose.yml exec fastapi python -c "print('Health check passed')"
            echo "Deploy complete at $(date)"
